<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0A2342;
    --navy-light: #0d2d56;
    --navy-dark: #061929;
    --gold: #C6A43F;
    --gold-light: #d4b35a;
    --gold-dark: #a88830;
    --gray-light: #F5F5F5;
    --gray-mid: #e8e8e8;
    --gray-text: #6b7280;
    --white: #ffffff;
    --text-dark: #1a1a2e;
    --shadow-sm: 0 2px 8px rgba(10,35,66,0.08);
    --shadow-md: 0 8px 32px rgba(10,35,66,0.12);
    --shadow-lg: 0 20px 60px rgba(10,35,66,0.18);
    --radius: 12px;
    --radius-lg: 20px;
    --radius-pill: 40px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Montserrat', sans-serif;
    color: var(--text-dark);
    background: var(--white);
    overflow-x: hidden;
    line-height: 1.7;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(198,164,63,0.4); }
    70% { box-shadow: 0 0 0 16px rgba(198,164,63,0); }
    100% { box-shadow: 0 0 0 0 rgba(198,164,63,0); }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes lineGrow {
    from { width: 0; }
    to { width: 60px; }
  }

  .animate-on-scroll {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.65s ease, transform 0.65s ease;
  }
  .animate-on-scroll.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }
  .delay-4 { transition-delay: 0.4s; }
  .delay-5 { transition-delay: 0.5s; }

  /* ─── UTILITIES ─── */
  .container {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .section { padding: 88px 0; }
  .section-alt { background: var(--gray-light); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .section-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .section-subtitle {
    font-size: 17px;
    color: var(--gray-text);
    max-width: 580px;
    line-height: 1.8;
  }
  .section-header { margin-bottom: 56px; }
  .section-header.centered { text-align: center; }
  .section-header.centered .section-subtitle { margin: 0 auto; }

  .gold-line {
    width: 60px;
    height: 3px;
    background: var(--gold);
    border-radius: 2px;
    margin-bottom: 20px;
    animation: lineGrow 0.8s ease forwards;
  }
  .centered .gold-line { margin: 0 auto 20px; }

  /* ─── BUTTONS ─── */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px 36px;
    border-radius: var(--radius-pill);
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
    animation: pulse-ring 2.5s infinite;
  }
  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(198,164,63,0.4);
    animation: none;
  }
  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 15px 36px;
    border-radius: var(--radius-pill);
    text-decoration: none;
    border: 2px solid var(--gold);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-outline:hover {
    background: var(--gold);
    color: var(--navy);
    transform: translateY(-2px);
  }

  /* ─── HEADER / NAV ─── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,35,66,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(198,164,63,0.15);
    transition: all 0.3s ease;
  }
  header.scrolled {
    background: rgba(6,25,41,0.99);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 76px;
  }

  /* LOGO */
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo-icon { flex-shrink: 0; }
  .logo-text-group { line-height: 1.2; }
  .logo-main {
    font-size: 16px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 0.3px;
    display: block;
  }
  .logo-sub {
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold); }

  .nav-cta {
    background: var(--gold);
    color: var(--navy) !important;
    padding: 10px 22px;
    border-radius: var(--radius-pill);
    font-size: 13px !important;
    font-weight: 700 !important;
  }
  .nav-cta:hover { background: var(--gold-light) !important; color: var(--navy) !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ─── HERO ─── */
  .hero {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 50%, #0f3060 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding-top: 76px;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(198,164,63,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(198,164,63,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Geometric decorative lines */
  .hero-geo {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .hero-geo svg { width: 100%; height: 100%; }

  .hero-inner {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    width: 100%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(198,164,63,0.12);
    border: 1px solid rgba(198,164,63,0.3);
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: var(--radius-pill);
    margin-bottom: 24px;
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: fadeIn 0.8s ease 0.2s both;
  }

  .hero h1 {
    font-size: clamp(32px, 4.5vw, 52px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 24px;
    animation: fadeUp 0.8s ease 0.3s both;
  }
  .hero h1 span {
    color: var(--gold);
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
  }

  .hero-sub {
    font-size: 17px;
    color: rgba(255,255,255,0.72);
    line-height: 1.8;
    margin-bottom: 40px;
    animation: fadeUp 0.8s ease 0.45s both;
  }

  .hero-actions {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease 0.6s both;
  }

  .hero-note {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    animation: fadeUp 0.8s ease 0.7s both;
  }

  .hero-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(198,164,63,0.2);
    border-radius: var(--radius-lg);
    padding: 36px;
    backdrop-filter: blur(8px);
    animation: fadeUp 0.9s ease 0.5s both;
  }
  .hero-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .hero-stat {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .hero-stat:last-of-type { border-bottom: none; }
  .hero-stat-icon {
    width: 44px;
    height: 44px;
    background: rgba(198,164,63,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 18px;
    flex-shrink: 0;
  }
  .hero-stat-num {
    font-size: 22px;
    font-weight: 800;
    color: var(--white);
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
  }

  /* ─── PAIN POINTS ─── */
  .pain-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
  }
  .pain-card {
    background: var(--white);
    border: 1px solid var(--gray-mid);
    border-radius: var(--radius-lg);
    padding: 36px 28px;
    position: relative;
    overflow: hidden;
    transition: all 0.35s ease;
    cursor: default;
  }
  .pain-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.35s ease;
    transform-origin: left;
  }
  .pain-card:hover {
    border-color: rgba(198,164,63,0.4);
    box-shadow: var(--shadow-md);
    transform: translateY(-4px);
  }
  .pain-card:hover::before { transform: scaleX(1); }

  .pain-icon {
    width: 56px;
    height: 56px;
    background: rgba(10,35,66,0.06);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--navy);
    margin-bottom: 20px;
    transition: all 0.35s ease;
  }
  .pain-card:hover .pain-icon {
    background: var(--navy);
    color: var(--gold);
  }
  .pain-card h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 10px;
  }
  .pain-card p {
    font-size: 14px;
    color: var(--gray-text);
    line-height: 1.75;
  }

  /* ─── DIFFERENTIALS ─── */
  .diff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 32px;
  }
  .diff-card {
    background: var(--navy);
    border-radius: var(--radius-lg);
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease;
  }
  .diff-card::after {
    content: '';
    position: absolute;
    bottom: -40px;
    right: -40px;
    width: 120px;
    height: 120px;
    background: rgba(198,164,63,0.06);
    border-radius: 50%;
    pointer-events: none;
  }
  .diff-card:hover { transform: translateY(-6px); }
  .diff-num {
    font-size: 48px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
    display: block;
  }
  .diff-card h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
  }
  .diff-card p {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    line-height: 1.75;
  }

  /* ─── SERVICES ─── */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
  }
  .service-card {
    background: var(--white);
    border: 1px solid var(--gray-mid);
    border-radius: var(--radius-lg);
    padding: 32px 28px;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }
  .service-card.featured {
    border-color: var(--gold);
    background: linear-gradient(135deg, #fffdf5 0%, #fffbea 100%);
  }
  .service-card.featured::before {
    content: 'GRATUITO';
    position: absolute;
    top: 16px; right: 16px;
    background: var(--gold);
    color: var(--navy);
    font-size: 10px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    letter-spacing: 1.5px;
  }
  .service-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-4px);
    border-color: rgba(10,35,66,0.2);
  }
  .service-card.featured:hover { border-color: var(--gold-dark); }
  .service-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-bottom: 18px;
    background: rgba(10,35,66,0.06);
    color: var(--navy);
    transition: all 0.3s ease;
  }
  .service-card.featured .service-icon { background: rgba(198,164,63,0.15); color: var(--gold-dark); }
  .service-card:hover .service-icon { background: var(--navy); color: var(--gold); }
  .service-card h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 10px;
  }
  .service-card p {
    font-size: 14px;
    color: var(--gray-text);
    line-height: 1.75;
  }

  /* ─── ABOUT ─── */
  .about-inner {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 80px;
    align-items: center;
  }
  .about-visual {
    position: relative;
  }
  .about-avatar {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: var(--radius-lg);
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(198,164,63,0.25);
    box-shadow: 0 24px 64px rgba(10,35,66,0.22);
  }
  .about-avatar-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    filter: grayscale(15%) contrast(1.05) brightness(0.95);
    transition: filter 0.5s ease;
  }
  .about-avatar:hover .about-avatar-photo {
    filter: grayscale(0%) contrast(1.08) brightness(1.0);
  }
  .about-avatar-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,35,66,0.08) 0%,
      rgba(10,35,66,0.0) 40%,
      rgba(10,35,66,0.55) 100%

<script>
  // ── Header scroll effect
  const header = document.getElementById('header');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 60);
  });

  // ── Mobile menu
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  hamburger.addEventListener('click', () => {
    mobileMenu.classList.toggle('open');
  });
  hamburger.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') mobileMenu.classList.toggle('open');
  });
  mobileMenu.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => mobileMenu.classList.remove('open'));
  });

  // ── Scroll animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));

  // ── Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const id = a.getAttribute('href');
      if (id === '#' || id === '#0') return;
      e.preventDefault();
      const el = document.querySelector(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
</script>
